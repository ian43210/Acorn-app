<!DOCTYPE html>
<html>
<head>
    <title>Acorn - Financial Growth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap');
        
        body { font-family: 'Nunito', sans-serif; background: #E8F5E9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #4B6B40; }
        
        #phone { width: 340px; height: 680px; background: #FFFDF0; border: 10px solid #5D4037; border-radius: 50px; position: relative; overflow: hidden; box-shadow: 0 30px 60px rgba(75, 107, 64, 0.2); }
        
        /* Bouncy In-App Notification */
        #notif { position: absolute; top: 100px; left: 20px; right: 20px; background: #FFD54F; color: #5D4037; padding: 12px; border-radius: 20px; text-align: center; font-weight: 800; transform: scale(0); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; border: 3px solid #FFF; }
        #notif.pop { transform: scale(1); }

        /* Header & Progress */
        .top-nav { padding: 30px 25px 0; display: flex; justify-content: space-between; align-items: center; }
        .streak-pill { background: #FFCCBC; color: #D84315; padding: 5px 15px; border-radius: 20px; font-size: 14px; border: 2px solid #FFF; }
        
        .xp-box { padding: 20px 25px; }
        .xp-bar { height: 16px; background: #CFD8DC; border-radius: 10px; border: 3px solid #FFF; overflow: hidden; }
        #fill { height: 100%; background: #81C784; width: 62.5%; transition: 0.8s; }

        /* The Hero Area (The Tree) */
        .tree-stage { height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #tree-art { font-size: 100px; filter: drop-shadow(0 10px 5px rgba(0,0,0,0.05)); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Cozy Interaction Cards */
        .card { background: #FFF; margin: 0 20px 20px; padding: 20px; border-radius: 30px; border: 3px solid #A5D6A7; text-align: center; box-shadow: 0 8px 0 #A5D6A7; }
        .drop-stat { font-size: 20px; color: #4FC3F7; margin-bottom: 10px; display: block; }
        
        .btn { border: none; border-radius: 20px; padding: 15px; width: 100%; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.1s; margin-bottom: 10px; border-bottom: 5px solid rgba(0,0,0,0.1); }
        .btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        .btn-water { background: #4FC3F7; color: white; }
        .btn-earn { background: #81C784; color: white; }

        /* Mini-Game Overlay */
        #game { display: none; position: absolute; inset: 0; background: #FFFDF0; z-index: 200; flex-direction: column; align-items: center; padding: 50px 20px; }
        .item-card { width: 220px; height: 220px; background: #FFF; border: 4px solid #A5D6A7; border-radius: 40px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 40px 0; box-shadow: 0 10px 0 #A5D6A7; }
    </style>
</head>
<body>
    <div id="phone">
        <div id="notif">Yay! +1 Water 💧</div>
        
        <div id="main-view">
            <div class="top-nav">
                <span style="font-size: 24px; font-weight: 800;">Açorn</span>
                <span class="streak-pill">🔥 7 Days</span>
            </div>
            <div class="xp-box">
                <span style="font-size: 12px; margin-bottom: 5px; display: block;">LEVEL 4: <span id="xp-num">250</span>/400 XP</span>
                <div class="xp-bar"><div id="fill"></div></div>
            </div>
            <div class="tree-stage">
                <div id="tree-art">🌱</div>
                <p style="font-size: 14px; color: #81C784;">Alex is watching!</p>
            </div>
            <div class="card">
                <span class="drop-stat">💧 <span id="drops">0</span> Drops</span>
                <button class="btn btn-water" onclick="waterIt()">WATER TREE</button>
                <button class="btn btn-earn" onclick="goGame()">EARN WATER</button>
            </div>
        </div>

        <div id="game">
            <h2 style="margin-top: 20px;">Need or Want?</h2>
            <div class="item-card" id="target">Bubble Tea</div>
            <div style="display: flex; gap: 15px; width: 100%;">
                <button class="btn" style="background:#FF8A80; color:white;" onclick="swipe('Want')">WANT</button>
                <button class="btn" style="background:#81C784; color:white;" onclick="swipe('Need')">NEED</button>
            </div>
        </div>
    </div>

    <script>
        let drops = 0; let xp = 250;
        const quests = [{n:"Electricity Bill", t:"Need"}, {n:"New Shoes", t:"Want"}, {n:"School Lunch", t:"Need"}, {n:"Game Skins", t:"Want"}];
        let qIdx = 0;

        function toast(m) {
            const n = document.getElementById('notif');
            n.innerText = m; n.classList.add('pop');
            setTimeout(() => n.classList.remove('pop'), 2000);
        }

        function goGame() { document.getElementById('game').style.display = 'flex'; }

        function swipe(c) {
            if(c === quests[qIdx].t) { drops++; toast("Good choice! +1 💧"); }
            else { toast("Wait, is that a need? 🧐"); }
            qIdx++;
            if(qIdx >= quests.length) {
                qIdx = 0; document.getElementById('game').style.display = 'none';
                document.getElementById('drops').innerText = drops;
            } else { document.getElementById('target').innerText = quests[qIdx].n; }
        }

        function waterIt() {
            if(drops > 0) {
                drops--; xp += 40;
                document.getElementById('drops').innerText = drops;
                document.getElementById('xp-num').innerText = xp;
                document.getElementById('fill').style.width = (xp/400)*100 + "%";
                if(xp >= 350) document.getElementById('tree-art').innerText = "🌳";
                toast("Tree is growing! ✨");
            } else { toast("Earn water first! 🐿️"); }
        }
    </script>
</body>
</html>
